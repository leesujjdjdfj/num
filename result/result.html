<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>숫자 야구 - 결과</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0057bd",
            "primary-dim": "#004ca6",
            "secondary": "#755600",
            "tertiary": "#006947",
            "error": "#ba1a1a",
            "error-dim": "#93000a",
            "background": "#f3f7fb",
            "surface": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "outline": "#73777b",
            "tertiary-container": "#69f6b8",
            "error-container": "#ffdad6",
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "1rem",
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .kinetic-bg {
      background: radial-gradient(circle at 50% 0%, rgba(0, 87, 189, 0.08) 0%, transparent 70%);
    }
    .kinetic-bg-defeat {
      background: radial-gradient(circle at 50% 0%, rgba(186, 26, 26, 0.08) 0%, transparent 70%);
    }
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      top: -10px;
      animation: confetti-fall 3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen selection:bg-primary/10">

<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100/50">
  <div class="flex items-center justify-between px-6 py-3 max-w-md mx-auto">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-xl">sports_baseball</span>
      <span class="text-primary font-extrabold tracking-tight font-headline text-sm">숫자 야구 챔피언십</span>
    </div>
    <button id="btn-close" class="text-on-surface-variant hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-xl">close</span>
    </button>
  </div>
</header>

<main id="result-main" class="pt-14 pb-44 px-4 max-w-md mx-auto min-h-screen kinetic-bg flex flex-col items-center">
  <!-- Result Area -->
  <div class="flex flex-col items-center mt-6 mb-6 text-center">
    <div id="result-icon-wrap" class="w-20 h-20 bg-gradient-to-br from-primary to-primary-dim rounded-full flex items-center justify-center shadow-lg mb-4">
      <span id="result-icon" class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
    </div>
    <h1 id="result-title" class="font-headline font-black text-3xl tracking-tight text-primary">VICTORY!</h1>
    <p id="result-subtitle" class="font-medium text-sm text-on-surface-variant mt-1">승리했습니다!</p>
  </div>

  <!-- Content Grid -->
  <div class="w-full space-y-3">
    <!-- Score Card -->
    <div class="bg-surface card-shadow p-5 rounded-lg flex flex-col items-center text-center">
      <span class="text-[10px] font-bold text-outline uppercase tracking-[0.2em] mb-1">FINAL SCORE</span>
      <span id="final-score" class="font-headline text-4xl font-black text-primary mb-2">0</span>
      <div id="personal-best-badge" class="hidden flex items-center gap-1.5 px-3 py-1 bg-tertiary-container/40 text-tertiary font-bold rounded-full text-[11px]">
        <span class="material-symbols-outlined text-[12px]">trending_up</span>
        <span>New Personal Best!</span>
      </div>
    </div>

    <!-- Game Summary Cards -->
    <div class="grid grid-cols-2 gap-3">
      <div class="bg-surface card-shadow p-4 rounded-lg flex flex-col items-center text-center">
        <span class="material-symbols-outlined text-secondary text-xl mb-1.5">numbers</span>
        <span class="text-[9px] font-bold text-outline uppercase tracking-wider mb-0.5">시도 횟수</span>
        <span id="attempts-count" class="font-headline text-lg font-bold text-on-surface">0 회</span>
      </div>
      <div class="bg-surface card-shadow p-4 rounded-lg flex flex-col items-center text-center">
        <span class="material-symbols-outlined text-tertiary text-xl mb-1.5">timer</span>
        <span class="text-[9px] font-bold text-outline uppercase tracking-wider mb-0.5">소요 시간</span>
        <span id="elapsed-time" class="font-headline text-lg font-bold text-on-surface">00:00</span>
      </div>
    </div>

    <!-- Play Summary -->
    <div class="bg-surface card-shadow p-5 rounded-lg space-y-3">
      <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <h3 class="font-bold text-xs">플레이 요약</h3>
        <div class="flex gap-2">
          <span class="text-[9px] text-outline font-medium">S: Strike</span>
          <span class="text-[9px] text-outline font-medium">B: Ball</span>
        </div>
      </div>
      <div id="play-summary-list" class="space-y-2.5">
        <!-- History items will be dynamically inserted here -->
        <p id="no-history-msg" class="text-center text-sm text-outline py-4">기록이 없습니다</p>
      </div>
    </div>
  </div>
</main>

<!-- Fixed Bottom Buttons -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background via-background/95 to-transparent pointer-events-none">
  <div class="max-w-md mx-auto space-y-2.5 pointer-events-auto">
    <!-- Rematch Button (Normal State) -->
    <button id="btn-rematch" class="w-full py-3.5 rounded-lg bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-lg">replay</span>
      다시 대전하기
    </button>
    
    <!-- Waiting for Opponent Button (Shown when request sent) -->
    <div id="btn-cancel-rematch" class="hidden flex gap-2">
      <div class="flex-1 py-3.5 rounded-lg bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 flex items-center justify-center gap-2 relative">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">hourglass_empty</span>
          <span>상대방 대기 중</span>
          <span class="flex gap-0.5 ml-1">
            <span class="w-1 h-1 bg-white/70 rounded-full animate-bounce" style="animation-delay: 0s;"></span>
            <span class="w-1 h-1 bg-white/70 rounded-full animate-bounce" style="animation-delay: 0.1s;"></span>
            <span class="w-1 h-1 bg-white/70 rounded-full animate-bounce" style="animation-delay: 0.2s;"></span>
          </span>
        </div>
      </div>
      <button id="btn-cancel-rematch-icon" class="px-3.5 py-3.5 rounded-lg bg-white border border-slate-200 text-on-surface font-bold text-sm active:scale-[0.98] transition-all flex items-center justify-center hover:bg-slate-50">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>
    
    <button id="btn-home" class="w-full py-3.5 rounded-lg bg-white border border-slate-200 text-on-surface font-bold text-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-lg">home</span>
      홈으로 돌아가기
    </button>
  </div>
</div>

<!-- Rematch Request Modal -->
<div id="rematch-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  
  <!-- Modal Content -->
  <div class="relative bg-surface rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-[scale-in_0.2s_ease-out]">
    <div class="flex flex-col items-center text-center">
      <!-- Icon -->
      <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
      </div>
      
      <!-- Title -->
      <h2 class="font-headline font-bold text-xl text-on-surface mb-2">재대결 요청</h2>
      
      <!-- Message -->
      <p class="text-on-surface-variant text-sm mb-6">
        <span id="rematch-opponent-name" class="font-bold text-primary">상대방</span>님이 재대결을 원합니다!<br/>
        함께 하시겠습니까?
      </p>
      
      <!-- Buttons -->
      <div class="flex gap-3 w-full">
        <button id="btn-decline-rematch" class="flex-1 py-3 rounded-lg bg-surface-container-low border border-slate-200 text-on-surface font-bold text-sm active:scale-[0.98] transition-all">
          다음에
        </button>
        <button id="btn-accept-rematch" class="flex-1 py-3 rounded-lg bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-lg">check</span>
          수락
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes scale-in {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>

<script type="module" src="result.js"></script>
</body>
</html>
