<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>숫자야구 - 프로필 설정</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be_Vietnam_Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#2a2f32",
            "outline-variant": "#a9aeb1",
            "on-primary-fixed": "#000000",
            "primary-fixed": "#6e9fff",
            "on-primary": "#f0f2ff",
            "surface-dim": "#ced5db",
            "surface-container-highest": "#d7dee3",
            "on-secondary-fixed-variant": "#684c00",
            "primary": "#0057bd",
            "on-primary-fixed-variant": "#002a62",
            "surface-container-low": "#ecf1f6",
            "on-background": "#2a2f32",
            "on-surface-variant": "#575c60",
            "on-secondary-fixed": "#443100",
            "secondary-container": "#ffca51",
            "primary-dim": "#004ca6",
            "tertiary-fixed": "#69f6b8",
            "background": "#f3f7fb",
            "primary-fixed-dim": "#5391ff",
            "surface-variant": "#d7dee3",
            "error-container": "#fb5151",
            "surface-container-high": "#dde3e8",
            "on-primary-container": "#002150",
            "on-error": "#ffefee",
            "surface-container": "#e3e9ee",
            "tertiary-fixed-dim": "#58e7ab",
            "secondary-fixed": "#ffca51",
            "surface-container-lowest": "#ffffff",
            "outline": "#73777b",
            "secondary": "#755600",
            "tertiary-container": "#69f6b8",
            "secondary-dim": "#674b00",
            "inverse-surface": "#0a0f12",
            "error": "#b31b25",
            "error-dim": "#9f0519",
            "on-tertiary-container": "#005a3c",
            "surface-tint": "#0057bd",
            "tertiary": "#006947",
            "surface": "#f3f7fb",
            "primary-container": "#6e9fff",
            "tertiary-dim": "#005c3d",
            "on-secondary-container": "#5c4300",
            "inverse-primary": "#4d8eff",
            "inverse-on-surface": "#999da1",
            "on-tertiary-fixed": "#00452d",
            "on-tertiary": "#c8ffe0",
            "surface-bright": "#f3f7fb",
            "on-tertiary-fixed-variant": "#006544",
            "on-secondary": "#fff1db",
            "secondary-fixed-dim": "#f6ba1e",
            "on-error-container": "#570008"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

    .input-focus-glow:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 87, 189, 0.2);
      border-color: #0057bd;
    }

    .avatar-option {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .avatar-option:hover {
      transform: scale(1.05);
    }
    .avatar-option.selected {
      ring-width: 4px;
      ring-color: #0057bd;
      transform: scale(1.1);
    }
    .avatar-option.selected::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      background: #0057bd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- 로고 및 환영 메시지 -->
    <div class="text-center mb-6">
      <div class="flex items-center justify-center gap-2 mb-3">
        <span class="material-symbols-outlined text-primary text-4xl" data-icon="sports_baseball" style="font-variation-settings: 'FILL' 1;">sports_baseball</span>
        <h1 class="font-headline font-bold text-2xl tracking-tight text-primary italic">숫자야구</h1>
      </div>
      <p class="text-on-surface-variant text-sm">게임을 시작하기 전에 프로필을 설정해주세요!</p>
    </div>

    <!-- 메인 카드 -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-xl shadow-primary/10 p-6">
      <div class="text-center mb-6">
        <h2 class="font-headline font-bold text-xl text-on-surface">프로필 설정</h2>
        <p class="text-xs text-on-surface-variant mt-1">닉네임과 아바타를 선택하세요</p>
      </div>

      <!-- 에러 메시지 -->
      <div id="error-message" class="hidden mb-4 p-3 bg-error/10 border border-error/20 rounded-lg text-error text-xs font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-sm" data-icon="error">error</span>
        <span id="error-text"></span>
      </div>

      <!-- 폼 -->
      <form id="profile-form" class="space-y-6">
        <!-- 아바타 선택 -->
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant mb-3">아바타 선택</label>
          <div id="avatar-grid" class="grid grid-cols-4 gap-3">
            <!-- 아바타 옵션들이 JS로 렌더링됨 -->
          </div>
          <input type="hidden" id="selected-avatar" value="">
        </div>

        <!-- 닉네임 -->
        <div>
          <label for="nickname" class="block text-xs font-semibold text-on-surface-variant mb-1.5">닉네임</label>
          <input
            type="text"
            id="nickname"
            placeholder="게임에서 사용할 닉네임 (2~12자)"
            maxlength="12"
            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-sm text-on-surface placeholder:text-outline transition-all input-focus-glow"
            required
          />
          <p class="text-[10px] text-on-surface-variant mt-1.5">다른 플레이어에게 표시되는 이름입니다.</p>
        </div>

        <!-- 설정 완료 버튼 -->
        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3.5 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
        >
          <span class="material-symbols-outlined text-xl" data-icon="check_circle">check_circle</span>
          <span id="submit-btn-text">설정 완료</span>
        </button>
      </form>
    </div>

    <!-- 하단 문구 -->
    <p class="text-center text-[10px] text-outline mt-6">
      프로필 정보는 나중에 설정에서 변경할 수 있습니다.
    </p>
  </div>

  <script type="module" src="./profile_setup.js"></script>
</body>
</html>
