<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>숫자야구 - 로그인</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be_Vietnam_Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#2a2f32",
            "outline-variant": "#a9aeb1",
            "on-primary-fixed": "#000000",
            "primary-fixed": "#6e9fff",
            "on-primary": "#f0f2ff",
            "surface-dim": "#ced5db",
            "surface-container-highest": "#d7dee3",
            "on-secondary-fixed-variant": "#684c00",
            "primary": "#0057bd",
            "on-primary-fixed-variant": "#002a62",
            "surface-container-low": "#ecf1f6",
            "on-background": "#2a2f32",
            "on-surface-variant": "#575c60",
            "on-secondary-fixed": "#443100",
            "secondary-container": "#ffca51",
            "primary-dim": "#004ca6",
            "tertiary-fixed": "#69f6b8",
            "background": "#f3f7fb",
            "primary-fixed-dim": "#5391ff",
            "surface-variant": "#d7dee3",
            "error-container": "#fb5151",
            "surface-container-high": "#dde3e8",
            "on-primary-container": "#002150",
            "on-error": "#ffefee",
            "surface-container": "#e3e9ee",
            "tertiary-fixed-dim": "#58e7ab",
            "secondary-fixed": "#ffca51",
            "surface-container-lowest": "#ffffff",
            "outline": "#73777b",
            "secondary": "#755600",
            "tertiary-container": "#69f6b8",
            "secondary-dim": "#674b00",
            "inverse-surface": "#0a0f12",
            "error": "#b31b25",
            "error-dim": "#9f0519",
            "on-tertiary-container": "#005a3c",
            "surface-tint": "#0057bd",
            "tertiary": "#006947",
            "surface": "#f3f7fb",
            "primary-container": "#6e9fff",
            "tertiary-dim": "#005c3d",
            "on-secondary-container": "#5c4300",
            "inverse-primary": "#4d8eff",
            "inverse-on-surface": "#999da1",
            "on-tertiary-fixed": "#00452d",
            "on-tertiary": "#c8ffe0",
            "surface-bright": "#f3f7fb",
            "on-tertiary-fixed-variant": "#006544",
            "on-secondary": "#fff1db",
            "secondary-fixed-dim": "#f6ba1e",
            "on-error-container": "#570008"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* 포커스 시 테두리 효과 */
    .input-focus-glow:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 87, 189, 0.2);
      border-color: #0057bd;
    }

    /* 버튼 로딩 애니메이션 */
    .btn-loading {
      position: relative;
      pointer-events: none;
    }
    .btn-loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- 로고 및 환영 메시지 -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-3">
        <span class="material-symbols-outlined text-primary text-4xl" data-icon="sports_baseball" style="font-variation-settings: 'FILL' 1;">sports_baseball</span>
        <h1 class="font-headline font-bold text-2xl tracking-tight text-primary italic">숫자야구</h1>
      </div>
      <p class="text-on-surface-variant text-sm">환영합니다!</p>
    </div>

    <!-- 메인 카드 -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-xl shadow-primary/10 p-6">
      <!-- 탭 헤더 -->
      <div class="flex mb-6">
        <button id="tab-login" class="flex-1 py-2 text-sm font-bold text-primary border-b-2 border-primary transition-colors">
          로그인
        </button>
        <button id="tab-signup" class="flex-1 py-2 text-sm font-bold text-on-surface-variant border-b-2 border-transparent hover:text-primary transition-colors">
          회원가입
        </button>
      </div>

      <!-- 에러 메시지 -->
      <div id="error-message" class="hidden mb-4 p-3 bg-error/10 border border-error/20 rounded-lg text-error text-xs font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-sm" data-icon="error">error</span>
        <span id="error-text"></span>
      </div>

      <!-- 폼 -->
      <form id="auth-form" class="space-y-4">
        <!-- 닉네임 (회원가입 시에만) -->
        <div id="nickname-field" class="hidden">
          <label for="nickname" class="block text-xs font-semibold text-on-surface-variant mb-1.5">닉네임</label>
          <input
            type="text"
            id="nickname"
            placeholder="게임에서 사용할 닉네임"
            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-sm text-on-surface placeholder:text-outline transition-all input-focus-glow"
          />
        </div>

        <!-- 이메일 -->
        <div>
          <label for="email" class="block text-xs font-semibold text-on-surface-variant mb-1.5">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="example@email.com"
            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-sm text-on-surface placeholder:text-outline transition-all input-focus-glow"
            required
          />
        </div>

        <!-- 비밀번호 -->
        <div>
          <label for="password" class="block text-xs font-semibold text-on-surface-variant mb-1.5">비밀번호</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="6자 이상 입력"
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-sm text-on-surface placeholder:text-outline transition-all input-focus-glow pr-12"
              required
              minlength="6"
            />
            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors">
              <span class="material-symbols-outlined text-xl" data-icon="visibility_off">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- 로그인/회원가입 버튼 -->
        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3.5 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
        >
          <span id="submit-btn-text">로그인</span>
        </button>
      </form>

      <!-- 구분선 -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-outline-variant/30"></div>
        <span class="text-xs text-outline">또는</span>
        <div class="flex-1 h-px bg-outline-variant/30"></div>
      </div>

      <!-- 구글 로그인 -->
      <button
        id="google-login-btn"
        class="w-full py-3 bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-semibold rounded-xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-3"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 계속하기
      </button>

      <!-- 모드 전환 링크 -->
      <p class="text-center text-xs text-on-surface-variant mt-5">
        <span id="mode-switch-text">아직 회원이 아니신가요?</span>
        <button type="button" id="mode-switch-btn" class="text-primary font-semibold hover:underline ml-1">회원가입</button>
      </p>
    </div>

    <!-- 하단 문구 -->
    <p class="text-center text-[10px] text-outline mt-6">
      계속 진행하면 서비스 이용약관 및 개인정보처리방침에 동의하는 것으로 간주됩니다.
    </p>
  </div>

  <script type="module" src="./auth_ux.js"></script>
</body>
</html>
