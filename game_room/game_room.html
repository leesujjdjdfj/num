<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>숫자 야구 - 대기방</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#000000",
              "surface-dim": "#ced5db",
              "on-error": "#ffefee",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#999da1",
              "on-background": "#2a2f32",
              "tertiary": "#006947",
              "on-tertiary-fixed-variant": "#006544",
              "outline": "#73777b",
              "on-tertiary-container": "#005a3c",
              "error-dim": "#9f0519",
              "primary-dim": "#004ca6",
              "tertiary-fixed-dim": "#58e7ab",
              "on-secondary-fixed": "#443100",
              "surface-variant": "#d7dee3",
              "on-surface-variant": "#575c60",
              "inverse-primary": "#4d8eff",
              "surface-container-low": "#ecf1f6",
              "surface": "#f3f7fb",
              "primary-fixed-dim": "#5391ff",
              "tertiary-fixed": "#69f6b8",
              "on-tertiary-fixed": "#00452d",
              "secondary-fixed": "#ffca51",
              "surface-container-highest": "#d7dee3",
              "primary-container": "#6e9fff",
              "outline-variant": "#a9aeb1",
              "surface-container-high": "#dde3e8",
              "on-secondary-container": "#5c4300",
              "secondary-container": "#ffca51",
              "inverse-surface": "#0a0f12",
              "on-primary-fixed-variant": "#002a62",
              "surface-container": "#e3e9ee",
              "error-container": "#fb5151",
              "secondary-fixed-dim": "#f6ba1e",
              "on-secondary": "#fff1db",
              "error": "#b31b25",
              "on-tertiary": "#c8ffe0",
              "background": "#f3f7fb",
              "primary": "#0057bd",
              "on-error-container": "#570008",
              "on-secondary-fixed-variant": "#684c00",
              "secondary": "#755600",
              "primary-fixed": "#6e9fff",
              "tertiary-dim": "#005c3d",
              "on-surface": "#2a2f32",
              "tertiary-container": "#69f6b8",
              "surface-bright": "#f3f7fb",
              "secondary-dim": "#674b00",
              "surface-tint": "#0057bd",
              "on-primary": "#f0f2ff",
              "on-primary-container": "#002150"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    html, body {
      height: 100dvh;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    
    /* READY stamp animation */
    @keyframes stampIn {
      0% {
        transform: scale(2.5) rotate(-25deg);
        opacity: 0;
      }
      50% {
        transform: scale(0.9) rotate(-12deg);
        opacity: 1;
      }
      60% {
        transform: scale(1.1) rotate(-18deg);
      }
      70% {
        transform: scale(0.95) rotate(-14deg);
      }
      80% {
        transform: scale(1.05) rotate(-16deg);
      }
      100% {
        transform: scale(1) rotate(-15deg);
        opacity: 1;
      }
    }
    
    .ready-stamp {
      animation: stampIn 0.4s cubic-bezier(0.17, 0.67, 0.3, 1.2) forwards;
    }
    
    /* Shake animation for start button */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(2px); }
    }
    
    .shake-ready {
      animation: shake 0.5s ease-in-out infinite;
    }
    
    /* Pulse glow for enabled start button */
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 10px 20px rgba(0,87,189,0.3); }
      50% { box-shadow: 0 10px 30px rgba(0,87,189,0.5), 0 0 20px rgba(0,87,189,0.3); }
    }
    
    .pulse-glow {
      animation: pulseGlow 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_20px_40px_rgba(0,87,189,0.06)]">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="sports_baseball">sports_baseball</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-blue-700 dark:text-blue-400 tracking-tighter">숫자 야구</h1>
</div>
<button class="text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="w-full max-w-md px-4 flex flex-col flex-1 pt-16 pb-24 overflow-hidden">
<!-- Room Code Section -->
<section class="flex flex-col items-center py-2 flex-shrink-0">
<span class="text-on-surface-variant font-label font-semibold text-[10px] tracking-wider uppercase">게임 대기실</span>
<div class="bg-surface-container-lowest px-4 py-2 rounded-xl flex items-center justify-between w-full shadow-[0_10px_25px_rgba(0,87,189,0.04)]">
<div class="flex flex-col">
<span class="text-[9px] text-on-surface-variant font-bold uppercase tracking-widest">Room Code</span>
<span id="room-code" class="text-xl font-headline font-extrabold text-primary tracking-widest">8492</span>
</div>
<button id="copy-room-code" class="bg-primary-container/20 text-primary p-2 rounded-xl active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg" data-icon="content_copy">content_copy</span>
</button>
</div>
</section>
<!-- Players Arena -->
<section id="players-arena" class="relative grid grid-cols-2 gap-3 items-center py-2 flex-shrink-0">
<!-- Versus Badge (Central Asymmetry) -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="bg-secondary-container text-on-secondary-container font-headline font-black italic px-3 py-1.5 text-sm rounded-full shadow-lg -rotate-12 scale-100 border-3 border-surface">
                    VS
                </div>
</div>
<!-- Player 1 (Me) -->
<div class="bg-surface-container-lowest p-3 rounded-xl flex flex-col items-center gap-2 shadow-[0_15px_30px_rgba(0,0,0,0.05)] border-b-4 border-primary/20 relative">
<div class="relative">
<img class="w-16 h-16 rounded-full object-cover ring-3 ring-primary-container" data-alt="vibrant character illustration of a young pro gamer with futuristic headphones and blue aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCA0Jtp2EirzCYRkg5zECuXJ779LTAkcLCQ2M1P4khrT5mRh5k2nTlRJn5ycRKeMqHsfMwR21ZLvTU-rR6lE9qdtsjxj8vVsEAwJQNMYAfkium6KxX0IJWPvT4alAQCm5lPHH70qgcUEumMDfIvf90MrzxE7nCDVjKPnsCsieXD5LYWCAWa7Q-NfGgMxHrOTDJoSuFgefcVniTWsnONhW3ZbpAY6Kr3TZQQU4rxOPos06Mamwf-OAysmoFxD1V9pjgg65TTKNqvYjPJ"/>
<div class="absolute -bottom-1 -right-1 bg-tertiary-container text-on-tertiary-container p-0.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-xs font-bold" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<div class="text-center">
<p class="font-headline font-bold text-on-surface text-sm">김초보 (나)</p>
<p class="text-[9px] font-semibold text-on-surface-variant uppercase">WAITING</p>
</div>
</div>
<!-- Player 2 (Opponent) -->
<div class="bg-surface-container-low p-3 rounded-xl flex flex-col items-center gap-2 border-b-4 border-transparent min-h-[140px] justify-center relative">
<!-- Waiting State -->
<div class="flex flex-col items-center gap-2 animate-pulse">
<div class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant/30">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</div>
<div class="text-center">
<p class="text-xs font-semibold text-on-surface-variant">상대방 대기 중...</p>
<div class="flex gap-1 justify-center mt-1">
<div class="w-1 h-1 rounded-full bg-primary/40"></div>
<div class="w-1 h-1 rounded-full bg-primary/40"></div>
<div class="w-1 h-1 rounded-full bg-primary/40"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Chat / Status Panel -->
<section class="bg-surface-container-low/50 rounded-lg flex flex-col gap-2 p-3 flex-1 min-h-0 overflow-hidden">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="forum">forum</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">Live Chat</span>
</div>
<div id="game-room-chat-messages" class="flex-1 overflow-y-auto min-h-0"></div>
<div class="flex gap-2 flex-shrink-0">
<input id="game-room-chat-input" class="flex-1 bg-surface-container-lowest border-none rounded-full text-sm focus:ring-2 focus:ring-primary/20 py-2 px-4 text-sm" placeholder="메시지를 입력하세요..." type="text" maxlength="200" autocomplete="off"/>
<button id="game-room-chat-send" type="button" class="bg-surface-container-high rounded-full text-primary active:scale-90 transition-all p-2">
<span class="material-symbols-outlined text-lg" data-icon="send">send</span>
</button>
</div>
</section>
<!-- Action Buttons -->
<div id="action-buttons" class="flex flex-col items-center gap-2 pt-3 flex-shrink-0">
<p id="status-message" class="text-[10px] font-medium text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-xs" data-icon="info">info</span>
                모든 플레이어가 준비되어야 게임을 시작할 수 있습니다.
            </p>
<!-- Ready Button (Guest) -->
<button id="ready-button" class="w-full rounded-full bg-gradient-to-r from-tertiary to-tertiary-container text-white font-headline font-black shadow-[0_10px_20px_rgba(0,105,71,0.3)] active:scale-95 transition-all py-4 text-lg hidden">
                준비하기
            </button>
<!-- Primary Action (Host Only) -->
<button id="start-button" class="w-full rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-black shadow-[0_10px_20px_rgba(0,87,189,0.3)] active:scale-95 transition-all opacity-50 cursor-not-allowed py-4 text-lg">
                게임 시작하기
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,87,189,0.08)] rounded-t-[2.5rem]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3">
<div class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-2xl px-5 py-2 scale-110 transition-all">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">홈</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-blue-500 transition-colors active:scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">랭킹</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-blue-500 transition-colors active:scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">설정</span>
</div>
</div>
</nav>
<script type="module" src="./game_room.js"></script>
</body></html>
