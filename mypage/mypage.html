<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>숫자야구 - 마이페이지</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be_Vietnam_Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#2a2f32",
            "outline-variant": "#a9aeb1",
            "on-primary-fixed": "#000000",
            "primary-fixed": "#6e9fff",
            "on-primary": "#f0f2ff",
            "surface-dim": "#ced5db",
            "surface-container-highest": "#d7dee3",
            "on-secondary-fixed-variant": "#684c00",
            "primary": "#0057bd",
            "on-primary-fixed-variant": "#002a62",
            "surface-container-low": "#ecf1f6",
            "on-background": "#2a2f32",
            "on-surface-variant": "#575c60",
            "on-secondary-fixed": "#443100",
            "secondary-container": "#ffca51",
            "primary-dim": "#004ca6",
            "tertiary-fixed": "#69f6b8",
            "background": "#f3f7fb",
            "primary-fixed-dim": "#5391ff",
            "surface-variant": "#d7dee3",
            "error-container": "#fb5151",
            "surface-container-high": "#dde3e8",
            "on-primary-container": "#002150",
            "on-error": "#ffefee",
            "surface-container": "#e3e9ee",
            "tertiary-fixed-dim": "#58e7ab",
            "secondary-fixed": "#ffca51",
            "surface-container-lowest": "#ffffff",
            "outline": "#73777b",
            "secondary": "#755600",
            "tertiary-container": "#69f6b8",
            "secondary-dim": "#674b00",
            "inverse-surface": "#0a0f12",
            "error": "#b31b25",
            "error-dim": "#9f0519",
            "on-tertiary-container": "#005a3c",
            "surface-tint": "#0057bd",
            "tertiary": "#006947",
            "surface": "#f3f7fb",
            "primary-container": "#6e9fff",
            "tertiary-dim": "#005c3d",
            "on-secondary-container": "#5c4300",
            "inverse-primary": "#4d8eff",
            "inverse-on-surface": "#999da1",
            "on-tertiary-fixed": "#00452d",
            "on-tertiary": "#c8ffe0",
            "surface-bright": "#f3f7fb",
            "on-tertiary-fixed-variant": "#006544",
            "on-secondary": "#fff1db",
            "secondary-fixed-dim": "#f6ba1e",
            "on-error-container": "#570008"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

    .avatar-option {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .avatar-option:hover {
      transform: scale(1.05);
    }
    .avatar-option.selected {
      ring-width: 4px;
      ring-color: #0057bd;
      transform: scale(1.1);
    }
    .avatar-option.selected::after {
      content: '✓';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      background: #0057bd;
      border-radius: 50%;
      color: white;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
  <!-- Top Navigation -->
  <header class="fixed top-0 w-full z-50 bg-white dark:bg-slate-900 shadow-[0_20px_40px_rgba(0,87,189,0.06)] flex justify-between items-center px-6 h-16">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="sports_baseball">sports_baseball</span>
      <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-blue-700 dark:text-blue-400 italic">마이페이지</h1>
    </div>
    <button id="btn-close" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors active:scale-95 duration-200">
      <span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="close">close</span>
    </button>
  </header>

  <main class="pt-24 px-4 max-w-md mx-auto space-y-6">
    <!-- Profile Header Card -->
    <section class="bg-gradient-to-br from-primary to-primary-dim rounded-2xl p-6 text-on-primary shadow-xl shadow-primary/20">
      <div class="flex items-center gap-4 mb-4">
        <!-- Avatar -->
        <div class="relative">
          <div id="profile-avatar" class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-3xl cursor-pointer hover:scale-105 transition-transform" title="아바타 변경">
            🎮
          </div>
          <button id="btn-edit-avatar" class="absolute bottom-0 right-0 bg-white text-primary p-2 rounded-full shadow-lg active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-lg" data-icon="edit">edit</span>
          </button>
        </div>
        
        <!-- User Info -->
        <div class="flex-1">
          <h2 id="profile-nickname" class="font-headline font-bold text-xl">플레이어</h2>
          <p class="text-sm opacity-90 mt-1">프로필 레벨</p>
        </div>
      </div>
      
      <!-- Edit Profile Button -->
      <button id="btn-edit-profile" class="w-full mt-4 py-2.5 bg-white/20 text-on-primary border border-white/30 font-semibold rounded-lg hover:bg-white/30 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm">
        <span class="material-symbols-outlined text-lg" data-icon="edit">edit</span>
        프로필 수정
      </button>
    </section>

    <!-- Stats Section -->
    <section class="space-y-3">
      <h3 class="font-headline font-bold text-lg px-1">나의 전적</h3>
      
      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-3">
        <!-- Total Games -->
        <div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-primary text-xl" data-icon="sports_soccer">sports_soccer</span>
            <span class="text-[10px] font-bold text-outline-variant uppercase tracking-wider">총 게임 수</span>
          </div>
          <p id="stat-total-games" class="font-headline font-black text-2xl text-on-surface">0</p>
          <p class="text-[10px] text-on-surface-variant mt-1">게임</p>
        </div>

        <!-- Win Count -->
        <div class="bg-primary/10 rounded-xl p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
            <span class="text-[10px] font-bold text-primary uppercase tracking-wider">승리</span>
          </div>
          <p id="stat-wins" class="font-headline font-black text-2xl text-primary">0</p>
          <p class="text-[10px] text-on-surface-variant mt-1">승리</p>
        </div>

        <!-- Win Rate -->
        <div class="bg-tertiary-container/30 rounded-xl p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-tertiary text-xl" data-icon="trending_up">trending_up</span>
            <span class="text-[10px] font-bold text-tertiary uppercase tracking-wider">승률</span>
          </div>
          <p id="stat-win-rate" class="font-headline font-black text-2xl text-tertiary">0%</p>
          <p class="text-[10px] text-on-surface-variant mt-1">승률</p>
        </div>

        <!-- Best Score -->
        <div class="bg-secondary-container/20 rounded-xl p-4 shadow-sm">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-secondary text-xl" data-icon="star">star</span>
            <span class="text-[10px] font-bold text-secondary uppercase tracking-wider">최고 점수</span>
          </div>
          <p id="stat-best-score" class="font-headline font-black text-2xl text-secondary">0</p>
          <p class="text-[10px] text-on-surface-variant mt-1">점수</p>
        </div>
      </div>
    </section>

    <!-- Recent Games Section -->
    <section class="space-y-3">
      <h3 class="font-headline font-bold text-lg px-1">최근 게임</h3>
      <div id="recent-games-list" class="space-y-2">
        <p class="text-center text-on-surface-variant text-sm py-4">게임 기록이 없습니다</p>
      </div>
    </section>

    <!-- Logout Button -->
    <button id="btn-logout" class="w-full py-3 mt-6 bg-error text-on-error font-bold rounded-xl shadow-lg shadow-error/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mb-6">
      <span class="material-symbols-outlined text-lg" data-icon="logout">logout</span>
      로그아웃
    </button>
  </main>

  <!-- Avatar Change Modal -->
  <div id="avatar-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    
    <!-- Modal Content -->
    <div class="relative bg-surface rounded-2xl shadow-2xl max-w-sm w-full p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-headline font-bold text-xl">아바타 선택</h2>
        <button id="btn-close-modal" class="text-on-surface-variant hover:text-on-surface">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      
      <div id="avatar-grid-modal" class="grid grid-cols-4 gap-3 mb-4">
        <!-- Avatar options will be rendered here -->
      </div>
      
      <button id="btn-confirm-avatar" class="w-full py-3 bg-primary text-on-primary font-bold rounded-xl active:scale-[0.98] transition-all">
        선택 완료
      </button>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div id="profile-edit-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    
    <!-- Modal Content -->
    <div class="relative bg-surface rounded-2xl shadow-2xl max-w-sm w-full p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-headline font-bold text-xl">프로필 수정</h2>
        <button id="btn-close-edit-modal" class="text-on-surface-variant hover:text-on-surface">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      
      <form id="edit-profile-form" class="space-y-4">
        <div>
          <label for="edit-nickname" class="block text-xs font-semibold text-on-surface-variant mb-1.5">닉네임</label>
          <input
            type="text"
            id="edit-nickname"
            placeholder="2~12자"
            maxlength="12"
            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-xl text-sm text-on-surface"
          />
          <p class="text-[10px] text-on-surface-variant mt-1">게임에서 표시되는 이름입니다</p>
        </div>
        
        <div class="flex gap-2 pt-2">
          <button type="button" id="btn-cancel-edit" class="flex-1 py-3 bg-surface-container-low text-on-surface font-bold rounded-xl active:scale-[0.98] transition-all">
            취소
          </button>
          <button type="submit" class="flex-1 py-3 bg-primary text-on-primary font-bold rounded-xl active:scale-[0.98] transition-all">
            저장
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bottom Nav Bar -->
  <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg rounded-t-[2.5rem] z-50 shadow-[0_-10px_30px_rgba(0,87,189,0.08)]">
    <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-600 dark:hover:text-blue-300 active:scale-90 duration-300" href="../home_ux/home_ux.html">
      <span class="material-symbols-outlined" data-icon="home">home</span>
      <span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">홈</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-600 dark:hover:text-blue-300 active:scale-90 duration-300" href="#">
      <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
      <span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">랭킹</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-100 rounded-full px-5 py-2 scale-110 transition-transform" href="#">
      <span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
      <span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold">설정</span>
    </a>
  </nav>

  <script type="module" src="./mypage.js"></script>
</body>
</html>
